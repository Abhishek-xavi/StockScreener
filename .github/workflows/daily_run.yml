name: Daily Screener Run

on:
  schedule:
    - cron: '30 14 * * *'   # 8:00 PM IST (UTC+5:30 → 14:30 UTC)
  workflow_dispatch:          # Manual trigger from GitHub UI anytime

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Restore posted-tweets log
        uses: actions/cache@v4
        with:
          path: logs/posted_tweets.log
          key: posted-tweets-log
          restore-keys: posted-tweets-log

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Screener Agent
        env:
          # Screener.in
          SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          # Twitter / X
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          # Claude API
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          # Gmail
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: python main.py --headless

      - name: Save posted-tweets log
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/posted_tweets.log
          key: posted-tweets-log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screener-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
